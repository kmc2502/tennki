<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Deck</title>
    <meta name="description" content="トランプカードで天気を楽しむ Weather Deck" />
    <meta property="og:title" content="Weather Deck" />
    <meta property="og:description" content="4枚のカードで天気を配る体験" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="header panel">
        <div>
          <h1 class="app-title">Weather Deck</h1>
          <p class="city-name" id="cityName">--</p>
        </div>
        <div class="header-actions">
          <button id="openSearchBtn" aria-label="都市を検索">🔍</button>
          <button id="openFavoriteBtn" aria-label="お気に入り">🗂</button>
          <button id="openSettingsBtn" aria-label="設定">⚙</button>
        </div>
      </header>

      <section class="time-row">
        <p id="slotLabel">読み込み中...</p>
        <button id="refreshBtn" class="ghost">再読み込み</button>
      </section>

      <section class="dealer panel" id="dealerPanel" hidden>
        <div class="dealer-avatar">🃏</div>
        <p id="dealerSpeech">本日は快晴です。</p>
      </section>

      <section class="main-grid" id="mainGrid"></section>

      <section id="jokerArea"></section>

      <section>
        <h2>3時間予報</h2>
        <div class="timeline" id="timeline"></div>
      </section>

      <footer class="footer-actions panel">
        <button id="toggleFavoriteBtn">お気に入りに追加</button>
        <button id="removeFavoriteBtn" class="ghost">お気に入りから削除</button>
      </footer>

      <section id="errorPanel" class="error panel" hidden></section>
    </div>

    <dialog id="searchDialog">
      <h3>都市を検索</h3>
      <input id="searchInput" type="text" placeholder="都市名を入力" />
      <ul id="searchResults"></ul>
      <button id="closeSearchBtn" class="ghost">閉じる</button>
    </dialog>

    <dialog id="favoritesDialog">
      <h3>お気に入り</h3>
      <ul id="favoritesList"></ul>
      <button id="closeFavoritesBtn" class="ghost">閉じる</button>
    </dialog>

    <dialog id="settingsDialog">
      <h3>設定</h3>
      <label class="switch-row">
        <input id="soundToggle" type="checkbox" />
        効果音
      </label>
      <button id="closeSettingsBtn" class="ghost">閉じる</button>
    </dialog>

    <div id="toast"></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
